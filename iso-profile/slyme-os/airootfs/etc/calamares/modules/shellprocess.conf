---
dontChroot: false
timeout: 120

script:
  - "-/usr/bin/bash -c 'systemctl enable NetworkManager.service'"
  - "-/usr/bin/bash -c 'systemctl enable ollama.service'"
  - "-/usr/bin/bash -c 'systemctl enable slyme-ai.service'"
  - "-/usr/bin/bash -c 'cp -rn /etc/skel/. /home/$(ls /home | head -1)/'"
  - "-/usr/bin/bash -c 'chown -R $(ls /home | head -1):$(ls /home | head -1) /home/$(ls /home | head -1)/'"
  - "-/usr/bin/bash -c 'cp /usr/local/bin/ollama /usr/local/bin/ollama'"
  - "-/usr/bin/bash -c 'cp /usr/local/bin/sliwm /usr/local/bin/sliwm && chmod +x /usr/local/bin/sliwm'"
  - "-/usr/bin/bash -c 'cp /usr/local/bin/slyme-ai /usr/local/bin/slyme-ai && chmod +x /usr/local/bin/slyme-ai'"
  - "-/usr/bin/bash -c 'cp /usr/local/lib/slyme-ai/slyme-ai.py /usr/local/lib/slyme-ai/slyme-ai.py 2>/dev/null || mkdir -p /usr/local/lib/slyme-ai && cp /usr/local/lib/slyme-ai/slyme-ai.py /usr/local/lib/slyme-ai/'"
  - "-/usr/bin/bash -c 'systemctl enable slyme-first-boot.service'"
